---
- name: Keyrings Verzeichnis erstellen
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Docker GPG-Schlüssel hinzufügen
  ansible.builtin.shell: |
    curl -fsSL https://download.docker.com/linux/debian/gpg | \
    gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Docker Repository hinzufügen
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Docker installieren
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Docker Dienst enablen und starten
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: User zur docker-Gruppe hinzufügen
  ansible.builtin.user:
    name: "{{ new_user }}"
    groups: docker
    append: true

- name: Prüfen ob Docker läuft
  ansible.builtin.command: docker run --rm hello-world
  register: docker_test
  changed_when: false
  ignore_errors: true

- name: Docker Test-Ergebnis anzeigen
  ansible.builtin.debug:
    msg: "Docker funktioniert korrekt"
  when: docker_test.rc == 0
