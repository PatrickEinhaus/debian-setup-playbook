---
- name: SSH-Config anpassen
  ansible.builtin.template:
    src: sshd-config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0600"
    validate: "/usr/sbin/sshd -t -f %s"
    backup: true
  notify: SSH Dienst neu starten

- name: SSH Dienst aktivieren und starten
  ansible.builtin.service:
    name: ssh
    state: started
    enabled: true
