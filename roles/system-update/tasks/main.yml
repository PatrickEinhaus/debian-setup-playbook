---
- name: APT Cache aktualisieren
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Alle Packages upgraden
  ansible.builtin.apt:
    upgrade: dist
    autoremove: true
    autoclean: true

- name: Benötigte Packages installieren
  ansible.builtin.apt:
    name:
      - sudo
      - curl
      - wget
      - gnupg
      - ca-certificates
      - git
      - unzip
    state: present

- name: Autoremove und Autoclean nach Package installation
  ansible.builtin.apt:
    autoclean: true
    autoremove: true

- name: Prüfen ob Reboot erforderlich ist 
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: reboot_required

- name: Reboot wenn nötig
  ansible.builtin.reboot:
    msg: "Reboot nach System-Upgrade"
    reboot_timeout: 300
  when: reboot_required.stat.exists
